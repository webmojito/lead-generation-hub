[build]
  command = "pnpm --filter @workspace/lead-hub run build"
  publish = "artifacts/lead-hub/dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10"
  BASE_PATH = "/"

[[redirects]]
  from = "/api/ai/chat"
  to = "/.netlify/functions/ai-chat"
  status = 200

[[redirects]]
  from = "/api/dashboard/*"
  to = "/.netlify/functions/dashboard/:splat"
  status = 200

[[redirects]]
  from = "/api/healthz"
  to = "/.netlify/functions/healthz"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
